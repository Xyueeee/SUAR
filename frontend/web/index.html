<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUAR</title>
  <link id="favicon" rel="icon" type="image/png" href="assets/logo/suar_logo_black.png" />
  <script>
    // Favicon follows the browser's light/dark scheme (black on light, white on
    // dark; red fallback). The logo is letterboxed onto a transparent square so
    // it is never stretched — the extra space is left blank.
    (function () {
      var el = function () { return document.getElementById("favicon"); };
      function draw(src) {
        var img = new Image();
        img.onload = function () {
          var s = 64, cv = document.createElement("canvas"); cv.width = s; cv.height = s;
          var ctx = cv.getContext("2d");
          var r = Math.min(s / img.width, s / img.height);
          var w = img.width * r, h = img.height * r;
          ctx.drawImage(img, (s - w) / 2, (s - h) / 2, w, h);
          if (el()) el().href = cv.toDataURL("image/png");
        };
        img.onerror = function () { if (el()) el().href = src; };
        img.src = src;
      }
      function pick() {
        if (!window.matchMedia) return "assets/logo/suar_logo_red.png";
        return window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "assets/logo/suar_logo_white.png" : "assets/logo/suar_logo_black.png";
      }
      draw(pick());
      if (window.matchMedia) {
        try { window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () { draw(pick()); }); } catch (e) {}
      }
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Map + charts + rich text -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ===================== LOGIN ===================== -->
  <div class="login-screen" id="login-screen">
    <form class="login" id="login-form" novalidate>
      <img class="login__logo" src="assets/logo/suar_logo_red.png" alt="SUAR" />
      <div class="login__wordmark">SUAR</div>
      <div class="login-note login-note--err" id="login-error" style="display:none"></div>
      <input class="input" type="email" id="login-email" placeholder="Email" aria-label="Email" autocomplete="username" />
      <div class="field-err" id="login-email-err" style="display:none"></div>
      <input class="input" type="password" id="login-password" placeholder="Password" aria-label="Password" autocomplete="current-password" />
      <div class="field-err" id="login-password-err" style="display:none"></div>
      <button class="btn btn--login btn--block" type="submit" id="login-submit">Sign in</button>
    </form>

    <!-- Backend (ngrok) URL config -->
    <button class="url-fab" id="url-fab" title="Backend server URL" aria-label="Set backend server URL">
      <span class="url-dot" id="url-dot"></span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <!-- ===================== APP SHELL ===================== -->
  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <img class="sidebar__logo" src="assets/logo/suar_logo_black.png" alt="SUAR" />
        <span class="sidebar__brandname">SUAR</span>
      </div>
      <nav class="nav" id="nav">
        <div class="nav__group-label">Overview</div>
        <div class="nav__item" data-route="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span>
        </div>

        <div class="nav__group-label">Response Data</div>
        <div class="nav__item" data-route="bundles">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05"/><path d="M12 22.08V12"/></svg>
          <span>Distress Bundles</span>
          <span class="nav__count" data-count="bundles"></span>
        </div>
        <div class="nav__item" data-route="devices">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
          <span>Devices</span>
          <span class="nav__count" data-count="devices"></span>
        </div>
        <div class="nav__item" data-route="map">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Map &amp; Danger Zones</span>
          <span class="nav__count" data-count="geofences"></span>
        </div>

        <div class="nav__group-label">Broadcast</div>
        <div class="nav__item" data-route="notices">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
          <span>Notices</span>
          <span class="nav__count" data-count="notices"></span>
        </div>

        <div class="nav__group-label">Content</div>
        <div class="nav__item" data-route="content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          <span>Guides &amp; Tips</span>
          <span class="nav__count" data-count="content"></span>
        </div>
        <div class="nav__item" data-route="prep">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <span>Prep Plans</span>
          <span class="nav__count" data-count="prep"></span>
        </div>
      </nav>
      <div class="sidebar__foot">
        <div class="sidebar__user" id="sidebar-user"></div>
        <button class="sidebar__signout" id="signout-btn" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>Sign out</span>
        </button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="icon-btn menu-toggle" id="menu-toggle" aria-label="Toggle navigation">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar__title" id="page-title">Dashboard</div>
        <div class="topbar__spacer"></div>
        <div class="conn" id="conn"><span class="conn__dot"></span><span id="conn-text">Checking…</span></div>
      </header>
      <main class="view" id="view"></main>
    </div>
  </div>

  <div class="toast-stack" id="toast-stack"></div>

  <!-- Libraries (UMD globals; no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

  <!-- App (classic scripts, shared SUAR global; order matters).
       ?v= busts the browser's script cache — no build step here means the
       browser otherwise keeps serving an old cached .js after an edit even
       on a normal reload. Bump this number whenever a deployed edit doesn't
       seem to show up (or just keep DevTools' Network "Disable cache" box
       checked while developing — that skips the need to bump it at all). -->
  <script src="js/config.js?v=3"></script>
  <script src="js/auth.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/ui.js?v=3"></script>
  <script src="js/views/dashboard.js?v=3"></script>
  <script src="js/views/bundles.js?v=3"></script>
  <script src="js/views/devices.js?v=3"></script>
  <script src="js/views/map.js?v=3"></script>
  <script src="js/views/notices.js?v=3"></script>
  <script src="js/views/content.js?v=3"></script>
  <script src="js/views/prep.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
